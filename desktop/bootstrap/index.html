<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting QMS Manual Stamper</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #fff7ed 0%, #f4f4f5 45%, #e4e4e7 100%);
        color: #18181b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(420px, 100%);
        padding: 32px 28px;
        border: 1px solid rgba(24, 24, 27, 0.08);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 24px 60px rgba(24, 24, 27, 0.12);
        text-align: center;
      }

      .spinner {
        width: 40px;
        height: 40px;
        margin: 0 auto 18px;
        border: 4px solid rgba(24, 24, 27, 0.12);
        border-top-color: #dc2626;
        border-radius: 999px;
        animation: spin 0.9s linear infinite;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }

      p {
        margin: 0;
        color: #52525b;
        line-height: 1.5;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="spinner" aria-hidden="true"></div>
      <h1>Starting QMS Manual Stamper</h1>
      <p>The bundled Laravel server is starting. This window will switch automatically when it is ready.</p>
    </main>
  </body>
</html>
